name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: cc

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }}, ${{ matrix.compiler }})

    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: make clean && make -j4 CC=${{ matrix.compiler }} && make test CC=${{ matrix.compiler }}

  test-asan:
    runs-on: ubuntu-latest
    name: Sanitizer (ASan/UBSan)

    steps:
      - uses: actions/checkout@v4

      - name: Build and test with sanitizers
        run: make clean && make test-asan

  windows-cross:
    runs-on: ubuntu-latest
    name: Windows cross-compile (mingw-w64)

    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cross-compile and link for Windows
        run: make clean && make -j4 windows-cross

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz cache loader (libFuzzer)

    steps:
      - uses: actions/checkout@v4

      - name: Build fuzzer and generate seed
        run: make fuzz CC=clang FUZZ_CC=clang

      - name: Fuzz the cache loader (bounded)
        run: ./build/fuzz/fuzz_corpus_load -max_total_time=120 -print_final_stats=1 build/fuzz/corpus

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            oom-*
            timeout-*
          if-no-files-found: ignore

  java:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    name: Java JNI (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build and test Java binding
        run: cd java && ./build.sh
