name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: cc

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }}, ${{ matrix.compiler }})

    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: make clean && make -j4 && make test

  test-asan:
    runs-on: ubuntu-latest
    name: Sanitizer (ASan/UBSan)

    steps:
      - uses: actions/checkout@v4

      - name: Build and test with sanitizers
        run: make clean && make test-asan

  java:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    name: Java JNI (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build and test Java binding
        run: cd java && ./build.sh
