name: Validate Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    name: Verify version strings match tag

    steps:
      - uses: actions/checkout@v4

      - name: Validate version strings
        run: |
          TAG="${GITHUB_REF_NAME}"
          ./scripts/check_version.sh "$TAG"
