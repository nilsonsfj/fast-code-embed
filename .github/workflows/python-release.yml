name: Python Release

# Build and publish the Python wheels. Decoupled from release.yml so the OIDC
# id-token permission and PyPI publishing stay isolated from the C/Java release.
#
# Triggers:
#   - push of a vX.Y.Z tag       -> build wheels, publish to PyPI
#   - manual run (workflow_dispatch) -> build wheels, publish to TestPyPI (default)
#     or PyPI, for a dry run before tagging.
#
# Publishing uses PyPI Trusted Publishing (OIDC): configure a GitHub Actions
# publisher on PyPI (and TestPyPI) for this repo + this workflow, with the
# environments named `pypi` and `testpypi`. No API tokens are stored.
#
# Wheels only (no sdist): the extension links the prebuilt static archive via an
# out-of-tree path, so a source build off PyPI cannot work; binary wheels are the
# distribution. The extension targets the stable ABI, so one cp39-abi3 wheel per
# platform covers every Python >= 3.9.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Validate version strings match tag
    steps:
      - uses: actions/checkout@v5
      - run: ./scripts/check_version.sh "${GITHUB_REF_NAME}"

  # ── Linux wheels: build inside manylinux_2_34 (matches the glibc >= 2.34 floor
  # the C/Java release uses), then auditwheel-repair to the manylinux tag. ──────
  wheels-linux:
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_34_x86_64
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_34_aarch64
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    name: Wheel (linux ${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v5

      - name: Build static library (inside manylinux)
        run: make clean && make -j4 lib

      - name: Build and repair wheel
        run: |
          PY=/opt/python/cp312-cp312/bin/python
          "$PY" -m pip install --upgrade build auditwheel
          "$PY" -m build --wheel python --outdir dist_raw
          "$PY" -m auditwheel repair dist_raw/*.whl -w wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: wheelhouse/*.whl

  # ── macOS wheels: native arm64 build, plus a cross-compiled x86_64 build from
  # the arm64 runner (the static archive cross-builds cleanly). 11.0 floor matches
  # the Makefile / build.sh deployment-target pin. ─────────────────────────────
  wheels-macos:
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    runs-on: macos-latest
    name: Wheel (macos ${{ matrix.arch }})
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v5

      - name: Set up build tools
        run: python3 -m pip install --upgrade --break-system-packages build delocate

      - name: Build static library
        run: |
          make clean
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make -j4 lib CC="cc -arch x86_64"
          else
            make -j4 lib
          fi

      - name: Build wheel
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            export ARCHFLAGS="-arch x86_64"
            export _PYTHON_HOST_PLATFORM="macosx-11.0-x86_64"
          fi
          python3 -m build --wheel python --outdir dist_raw

      - name: Delocate wheel
        run: |
          python3 -m delocate.cmd.delocate_wheel \
            --require-archs ${{ matrix.arch }} -w wheelhouse dist_raw/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.arch }}
          path: wheelhouse/*.whl

  # ── Publish all collected wheels via Trusted Publishing (OIDC). ──────────────
  publish:
    needs: [wheels-linux, wheels-macos]
    # Explicit condition: run whenever both wheel jobs succeeded. Without this,
    # the default success() condition is poisoned by the skipped `validate` job
    # on a workflow_dispatch run (a skipped ancestor makes downstream jobs skip),
    # so the publish step never ran on the TestPyPI dry run.
    if: >-
      always() &&
      needs.wheels-linux.result == 'success' &&
      needs.wheels-macos.result == 'success'
    runs-on: ubuntu-latest
    name: Publish wheels
    environment: ${{ (github.event_name == 'push' || inputs.target == 'pypi') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels
        run: ls -la dist

      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
