name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate version strings match tag
    steps:
      - uses: actions/checkout@v4
      - name: Validate version strings
        run: ./scripts/check_version.sh "${GITHUB_REF_NAME}"

  release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux artifacts build inside manylinux_2_34 (AlmaLinux 9, glibc 2.34)
          # so the shipped binaries load on glibc >= 2.34 and every newer release.
          # The container ships a modern GCC, so codegen/optimization is unaffected.
          # aarch64 builds natively on an arm64 runner (no cross-compile).
          - runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_34_x86_64
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_34_aarch64
            arch: aarch64
          - runner: macos-latest
            container: ''
            arch: arm64

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Build static library
        run: |
          make clean && make -j4 lib
          cp build/libfast_code_embed.a "build/libfast_code_embed.a-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libfast_code_embed.a-${{ matrix.arch }}
          path: build/libfast_code_embed.a-${{ matrix.arch }}

  java-artifacts:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both Linux JNI libraries build natively inside manylinux_2_34, so the
          # full JNI test suite (build.sh) now also runs on aarch64 — the old
          # cross-compiled aarch64 .so was never exercised on real hardware.
          - runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_34_x86_64
            libname: libfast_code_embed_jni.so
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_34_aarch64
            libname: libfast_code_embed_jni.so
            arch: aarch64
          - runner: macos-latest
            container: ''
            libname: libfast_code_embed_jni.dylib
            arch: arm64
            java_arch: aarch64

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    name: Java JNI (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      # In the manylinux container, install a JDK with JNI headers via dnf;
      # build.sh autodetects JAVA_HOME from `which java`. macOS has no container,
      # so it keeps using setup-java.
      - name: Set up JDK 11 (container)
        if: matrix.container != ''
        run: dnf install -y java-11-openjdk-devel

      - name: Set up JDK 11 (macOS)
        if: matrix.container == ''
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          architecture: ${{ matrix.java_arch }}

      - name: Build JNI shared library (also runs the JNI test suite)
        run: |
          cd java && ./build.sh
          cp lib/native/${{ matrix.libname }} "lib/native/${{ matrix.libname }}-${{ matrix.arch }}"

      # Guardrail: fail the release if a Linux .so ever references a glibc symbol
      # newer than 2.34, rather than silently shipping a higher portability floor.
      - name: Verify glibc floor (Linux)
        if: matrix.container != ''
        run: |
          so="java/lib/native/${{ matrix.libname }}-${{ matrix.arch }}"
          max="$(objdump -T "$so" \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' \
            | sed 's/GLIBC_//' | sort -V | tail -1)"
          echo "Highest glibc symbol referenced: GLIBC_${max:-<none>}"
          if [ -n "$max" ] && [ "$(printf '%s\n2.34\n' "$max" | sort -V | tail -1)" != "2.34" ]; then
            echo "ERROR: $so requires GLIBC_$max (> 2.34); portability floor regressed."
            exit 1
          fi

      - name: Upload JNI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.libname }}-${{ matrix.arch }}
          path: java/lib/native/${{ matrix.libname }}-${{ matrix.arch }}

  create-release:
    needs: [release, java-artifacts]
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -exec cp {} release_assets/ \;
          ls -la release_assets/

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          files: |
            release_assets/*

  maven-publish:
    needs: [java-artifacts]
    runs-on: ubuntu-latest
    name: Publish to Maven Central
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download JNI artifacts
        uses: actions/download-artifact@v4
        with:
          path: jni-artifacts

      - name: Bundle native libraries into JAR resources
        run: |
          mkdir -p java/src/main/resources/native/linux-x86_64
          mkdir -p java/src/main/resources/native/linux-aarch64
          mkdir -p java/src/main/resources/native/darwin-aarch64
          cp jni-artifacts/libfast_code_embed_jni.so-x86_64/libfast_code_embed_jni.so-x86_64 \
             java/src/main/resources/native/linux-x86_64/libfast_code_embed_jni.so
          cp jni-artifacts/libfast_code_embed_jni.so-aarch64/libfast_code_embed_jni.so-aarch64 \
             java/src/main/resources/native/linux-aarch64/libfast_code_embed_jni.so
          cp jni-artifacts/libfast_code_embed_jni.dylib-arm64/libfast_code_embed_jni.dylib-arm64 \
             java/src/main/resources/native/darwin-aarch64/libfast_code_embed_jni.dylib

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.OSSRH_USERNAME }}</username>
                <password>${{ secrets.OSSRH_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn versions:set -f java/pom.xml -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        # Tests already ran in the java-artifacts job (build.sh runs the full
        # JNI test suite), and this job needs: [java-artifacts]; -DskipTests here
        # only avoids re-running them without the staged native library.
        run: |
          mvn deploy -f java/pom.xml -DskipTests \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -Dossrh.username="${{ secrets.OSSRH_USERNAME }}" \
            -Dossrh.password="${{ secrets.OSSRH_TOKEN }}"
        env:
          MAVEN_OPTS: -Xmx512m
